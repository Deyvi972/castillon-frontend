<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastillonV2 — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            top: -100px; left: -100px;
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
            bottom: -80px; right: -80px;
            border-radius: 50%;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(59,130,246,0.4);
        }

        .logo h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-top: 4px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 28px;
            font-size: 12px;
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .dot.green  { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .dot.red    { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .dot.yellow { background: #eab308; box-shadow: 0 0 8px #eab308; }

        .status-text { color: rgba(255,255,255,0.6); flex: 1; }

        .badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            display: none;
        }
        .badge.bd    { background: rgba(34,197,94,0.2);  color: #22c55e; display: inline; }
        .badge.local { background: rgba(234,179,8,0.2);  color: #eab308; display: inline; }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.08);
        }

        input::placeholder { color: rgba(255,255,255,0.25); }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 16px rgba(59,130,246,0.35);
        }

        .btn-login:hover   { opacity: 0.9; }
        .btn-login:active  { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 12px 14px;
            color: #fca5a5;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            color: rgba(255,255,255,0.25);
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">🐾</div>
        <h1>CastillonV2</h1>
        <p>Sistema de Gestión Veterinaria</p>
    </div>

    <div class="status-bar">
        <div class="dot" id="dot"></div>
        <span class="status-text" id="statusText">Verificando conexión...</span>
        <span class="badge bd"    id="badgeBD">BD en línea</span>
        <span class="badge local" id="badgeLocal">Modo local</span>
    </div>

    <div class="form-group">
        <label>Usuario (correo)</label>
        <input type="text" id="logeo" placeholder="Ej: Ramírez_Paredes@gmail,com" autocomplete="username">
    </div>

    <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="clave" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">Ingresar</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="footer">CastillonV2 © 2026 — Todos los derechos reservados</div>
</div>

<script>
    // ══════════════════════════════════════════════════
    //  CONFIGURACIÓN — actualiza esta URL con ngrok
    // ══════════════════════════════════════════════════
    const API_BASE = 'https://castillon-backend-ifjc.onrender.com';

    // ══════════════════════════════════════════════════
    //  USUARIOS FALLBACK (cuando API no está disponible)
    // ══════════════════════════════════════════════════
    const USUARIOS_LOCAL = [
        { logeo: 'Ramírez_Paredes@gmail,com',  clave: '52142',  idtipo: 1, nombre: 'Ramírez Paredes',   rol: 'ADMIN' },
        { logeo: 'Bravo_Orellana@gmail,com',   clave: '43223',  idtipo: 2, nombre: 'Bravo Orellana',    rol: 'VETERINARIO' },
        { logeo: 'Martínez_Soto@gmail,com',    clave: '24325',  idtipo: 4, nombre: 'Martínez Soto',     rol: 'RECEPCIONISTA' },
        { logeo: 'Yáñez_Aguirre@gmail,com',    clave: '58467',  idtipo: 3, nombre: 'Yáñez Aguirre',     rol: 'ASISTENTE' },
        { logeo: 'Jiménez_Zambrano@gmail,com', clave: '86651',  idtipo: 3, nombre: 'Jiménez Zambrano',  rol: 'ASISTENTE' },
        { logeo: 'Godínez_Sandoval@gmail,com', clave: '56751',  idtipo: 5, nombre: 'Godínez Sandoval',  rol: 'EMPLEADO' },
        { logeo: 'Torres_Carrasco@gmail,com',  clave: '14634',  idtipo: 5, nombre: 'Torres Carrasco',   rol: 'EMPLEADO' },
        { logeo: 'Pacheco_Morales@gmail,com',  clave: '65858',  idtipo: 5, nombre: 'Pacheco Morales',   rol: 'EMPLEADO' },
        { logeo: 'Quiroz_Cifuentes@gmail,com', clave: '84547',  idtipo: 5, nombre: 'Quiroz Cifuentes',  rol: 'EMPLEADO' },
        { logeo: 'Ruiz_Zamora@gmail,com',      clave: '24543',  idtipo: 5, nombre: 'Ruiz Zamora',       rol: 'EMPLEADO' },
        { logeo: 'Hernández_Rivas@gmail,com',  clave: '37373',  idtipo: 5, nombre: 'Hernández Rivas',   rol: 'EMPLEADO' },
        { logeo: 'Montes_Araya@gmail,com',     clave: '57893',  idtipo: 5, nombre: 'Montes Araya',      rol: 'EMPLEADO' },
        { logeo: 'Ochoa_Riquelme@gmail,com',   clave: '56753',  idtipo: 5, nombre: 'Ochoa Riquelme',    rol: 'EMPLEADO' },
        { logeo: 'Sánchez_Andrade@gmail,com',  clave: '45865',  idtipo: 5, nombre: 'Sánchez Andrade',   rol: 'EMPLEADO' },
        { logeo: 'Urrutia_Salas@gmail,com',    clave: '95868',  idtipo: 5, nombre: 'Urrutia Salas',     rol: 'EMPLEADO' },
        { logeo: 'Delgado_Barrios@gmail,com',  clave: '15685',  idtipo: 5, nombre: 'Delgado Barrios',   rol: 'EMPLEADO' },
        { logeo: 'Cruz_Escobar@gmail,com',     clave: '21415',  idtipo: 5, nombre: 'Cruz Escobar',      rol: 'EMPLEADO' },
        { logeo: 'Guzmán_Córdova@gmail,com',   clave: '29799',  idtipo: 5, nombre: 'Guzmán Córdova',    rol: 'EMPLEADO' },
        { logeo: 'Flores_Acevedo@gmail,com',   clave: '69313',  idtipo: 5, nombre: 'Flores Acevedo',    rol: 'EMPLEADO' },
        { logeo: 'Ortega_Novoa@gmail,com',     clave: '34783',  idtipo: 5, nombre: 'Ortega Novoa',      rol: 'EMPLEADO' },
    ];

    // ══════════════════════════════════════════════════
    //  ESTADO DE LA API
    // ══════════════════════════════════════════════════
    let apiDisponible = false;

    async function checkApi() {
        try {
            const res = await fetch(`${API_BASE}/api/auth/ping`, {
                signal: AbortSignal.timeout(3000),
                headers: {  }
            });
            apiDisponible = res.ok;
        } catch {
            apiDisponible = false;
        }
        actualizarEstado();
    }

    function actualizarEstado() {
        const dot        = document.getElementById('dot');
        const statusText = document.getElementById('statusText');
        const badgeBD    = document.getElementById('badgeBD');
        const badgeLocal = document.getElementById('badgeLocal');

        if (apiDisponible) {
            dot.className        = 'dot green';
            statusText.textContent = 'Conectado a la base de datos';
            badgeBD.style.display    = 'inline';
            badgeLocal.style.display = 'none';
        } else {
            dot.className        = 'dot yellow';
            statusText.textContent = 'Modo local (sin conexión al servidor)';
            badgeBD.style.display    = 'none';
            badgeLocal.style.display = 'inline';
        }
    }

    // ══════════════════════════════════════════════════
    //  LOGIN PRINCIPAL
    // ══════════════════════════════════════════════════
    async function doLogin() {
        const logeo  = document.getElementById('logeo').value.trim();
        const clave  = document.getElementById('clave').value.trim();
        const btn    = document.getElementById('btnLogin');
        const errDiv = document.getElementById('errorMsg');

        errDiv.style.display = 'none';

        if (!logeo || !clave) {
            mostrarError('Por favor ingresa usuario y contraseña.');
            return;
        }

        btn.disabled     = true;
        btn.textContent  = 'Verificando...';

        await checkApi();

        if (apiDisponible) {
            await loginConAPI(logeo, clave, btn);
        } else {
            loginLocal(logeo, clave, btn);
        }
    }

    async function loginConAPI(logeo, clave, btn) {
        try {
            const res = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    
                },
                body: JSON.stringify({ logeo, clave }),
                signal: AbortSignal.timeout(5000)
            });

            const data = await res.json();

            if (data.success) {
                sessionStorage.setItem('usuario', JSON.stringify({ ...data, modo: 'BD' }));
                window.location.href = 'dashboard.html';
            } else {
                mostrarError(data.mensaje || 'Credenciales incorrectas.');
                resetBtn(btn);
            }
        } catch {
            // Si falla en el intento, caer a local
            loginLocal(logeo, clave, btn);
        }
    }

    function loginLocal(logeo, clave, btn) {
        const usuario = USUARIOS_LOCAL.find(
            u => u.logeo === logeo && u.clave === clave
        );

        if (usuario) {
            sessionStorage.setItem('usuario', JSON.stringify({ ...usuario, modo: 'LOCAL' }));
            window.location.href = 'dashboard.html';
        } else {
            mostrarError('Usuario o contraseña incorrectos.');
            resetBtn(btn);
        }
    }

    function mostrarError(msg) {
        const errDiv = document.getElementById('errorMsg');
        errDiv.textContent   = msg;
        errDiv.style.display = 'block';
    }

    function resetBtn(btn) {
        btn.disabled    = false;
        btn.textContent = 'Ingresar';
    }

    // Enter para hacer login
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });

    // Verificar al cargar
    checkApi();
</script>
</body>
</html>
